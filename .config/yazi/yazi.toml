[mgr]
show_hidden = false
linemode = "size"

[opener]
execute = [
    { run = 'nvim %s', desc = "edit with nvim", block = true, for = "unix" },
    { run = 'zeditor %s', desc = "edit with zed", block = true, for = "unix" },
    { run = './%s', desc = "execute" },
]
edit = [
    { run = 'nvim %s', block = true, for = "unix" },
]
view_image = [
    { run = 'loupe %s', orphan = true, for = "unix" },
]
cd_dir = [
    { run = 'cd %s && exec bash', block = true, desc = "cd into dir", for = "unix" },
]
edit_dir = [
    { run = 'nvim %s', block = true, desc = "edit with nvim", for = "unix" },
    { run = 'zeditor %s', block = true, desc = "zed editor", for = "unix" },
    { run = 'nautilus %s', orphan = true, desc = "nautilus", for = "unix" },
    { run = 'obsidian %s', orphan = true, desc = "open vault with obsidian", for = "unix" },
]
video_player = [
    { run = 'dragon %s', orphan = true, for = "unix" },
]
pdf_reader = [
    { run = 'okular %s', orphan = true, desc = "okular", for = "unix" },
    { run = 'zen-browser %s', orphan = true, desc = "browser", for = "unix" },
]
extract = [
    { run = 'unzip %s', desc = "extract here", for = "unix" },
    { run = 'zipat %s', desc = "extract in folder", for = "unix" },
]
md_viewer = [
    { run = 'zen-browser %s', orphan = true, desc = "preview in browser", for = "unix" },
    { run = 'nvim %s', block = true, desc = "edit in nvim", for = "unix" },
]

[open]
rules = [
    { mime = "image/*", use = "view_image" },
    { url = "*/", use = ["cd_dir", "edit_dir"] },
    { mime = "video/*", use = "video_player" },
    { url = "*.md", use = "md_viewer" },
    { url = "*.pdf", use = "pdf_reader" },
    { url = "*.zip", use = "extract" },
    { url = "*.sh", use = "execute" },
    { mime = "text/*", use = "edit" },
    { url = "*", use = "edit" },
]

[plugin]
append_previewers = [
    { mime = "application/*zip",            run = "unzip" },
    { mime = "application/x-tar",           run = "unzip" },
    { mime = "application/x-bzip2",         run = "unzip" },
    { mime = "application/x-7z-compressed", run = "unzip" },
    { mime = "application/x-rar",           run = "unzip" },
    { mime = "application/x-xz",            run = "unzip" },
]
